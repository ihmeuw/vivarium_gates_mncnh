workflow:
  name: "test_pipeline"
  project: "proj_simscience"
  queue: "all.q"
  output_directory: INSERT_VALID_DIRECTORY
  # ==========================================================================
  # Pre-simulation data generation pipeline.
  #
  # Dagger steps run STRICTLY SEQUENTIALLY (every task in a step depends on all
  # tasks of the previous step). Parallelism therefore lives INSIDE steps:
  #   - parallel_runner.py  -> fans draws across `cores` on one node
  #   - run_paf_sim.py      -> fans draws via psimulate (jobmon)
  #   - generate_pafs.py / generate_caps.py -> serial internally
  #
  # Steps are ordered by dependency. Resource values are first-pass estimates
  # -- tune as needed. Output paths are INSERT_VALID_DIRECTORY placeholders;
  # set them to valid, writable directories before running.
  # ==========================================================================
  steps:
    # ---- Step 0: guard -- fail fast if the working tree is dirty -------------
    - name: "check_clean_working_tree"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 1
        runtime: "00:01:00"
      args:
        path: src/vivarium_gates_mncnh/tools/check_working_tree.py

    # ---- Step 1: hemoglobin -> birth effects (LBWSG shifts), per draw --------
    # Parallel across draws via parallel_runner.py. Produces lbwsg_shifts/ and
    # iv_iron_lbwsg_shifts/, read by Step 3 (sepsis) and by make_artifacts.
    - name: "hemoglobin_effects_birth"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 40
        runtime: "04:00:00"
        cores: 5
      args:
        path: src/vivarium_gates_mncnh/data/hemoglobin_effects/parallel_runner.py
        positional_args:
          - "--workers"
          - 5
          - "--"
          - generate_birth_effects.py

    # ---- Step 2: IV-iron stillbirth effects (single invocation) --------------
    # calculate_iv_iron_stillbirth_effects() loops all draws internally and is
    # NOT draw-parallel, so it runs as a single-task step via the __main__ block
    # in hgb_birth_effect_generation.py. Independent of Step 1's outputs.
    - name: "hemoglobin_iv_iron_stillbirth"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 16
        runtime: "00:30:00"
      args:
        path: src/vivarium_gates_mncnh/data/hemoglobin_effects/hgb_birth_effect_generation.py

    # ---- Step 3: hemoglobin -> neonatal sepsis effects, per draw -------------
    # Parallel across draws via parallel_runner.py. Reads lbwsg_shifts/ from
    # Step 1, so Step 1 must complete first.
    - name: "hemoglobin_effects_sepsis"
      type: python
      environment: vivarium_gates_mncnh_simulation
      resources:
        memory_gb: 40
        runtime: "02:00:00"
        cores: 5
      args:
        path: src/vivarium_gates_mncnh/data/hemoglobin_effects/parallel_runner.py
        positional_args:
          - "--workers"
          - 5
          - "--"
          - generate_nn_sepsis_effects.py

    # ---- Step 4: maternal-disorder PAFs --------------------------------------
    - name: "hgb_maternal_disorders_pafs"
      type: python
      environment: vivarium_gates_mncnh_simulation
      resources:
        memory_gb: 16
        runtime: "06:00:00"
      args:
        path: src/vivarium_gates_mncnh/data/hgb_pafs_maternal_disorders/code/generate_pafs.py

    # ---- Step 5: LBWSG relative-risk caps (one step per location) ------------
    # generate_caps.py is per-location and serial; split into 3 steps. Must
    # precede Step 6 (the PAF sim's artifact bakes in these caps).
    - name: "lbwsg_caps_ethiopia"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 16
        runtime: "01:00:00"
      args:
        path: src/vivarium_gates_mncnh/data/lbwsg_rr_caps/generate_caps.py
        keyword_args:
          l: "Ethiopia"
    - name: "lbwsg_caps_nigeria"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 16
        runtime: "01:00:00"
      args:
        path: src/vivarium_gates_mncnh/data/lbwsg_rr_caps/generate_caps.py
        keyword_args:
          l: "Nigeria"
    - name: "lbwsg_caps_pakistan"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 16
        runtime: "01:00:00"
      args:
        path: src/vivarium_gates_mncnh/data/lbwsg_rr_caps/generate_caps.py
        keyword_args:
          l: "Pakistan"

    # ---- Step 6: LBWSG PAFs (one step per location) --------------------------
    # run_paf_sim.py launches psimulate (parallel across draws) and needs the RR
    # caps from Step 5. It self-dispatches its sub-envs (psimulate -> simulation,
    # make_artifacts -> artifact via `conda run`)
    - name: "paf_sim_ethiopia"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 16
        runtime: "00:30:00"
        requires_archive_node: True
      args:
        path: src/vivarium_gates_mncnh/data/lbwsg_paf/code/run_paf_sim.py
        keyword_args:
          a: test_workflow
          l: "Ethiopia"
          output-dir: INSERT_VALID_DIRECTORY
    - name: "paf_sim_nigeria"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 16
        runtime: "00:30:00"
        requires_archive_node: True
      args:
        path: src/vivarium_gates_mncnh/data/lbwsg_paf/code/run_paf_sim.py
        keyword_args:
          a: test_workflow
          l: "Nigeria"
          output-dir: INSERT_VALID_DIRECTORY
    - name: "paf_sim_pakistan"
      type: python
      environment: vivarium_gates_mncnh_artifact
      resources:
        memory_gb: 16
        runtime: "00:30:00"
        requires_archive_node: True
      args:
        path: src/vivarium_gates_mncnh/data/lbwsg_paf/code/run_paf_sim.py
        keyword_args:
          a: test_workflow
          l: "Pakistan"
          output-dir: INSERT_VALID_DIRECTORY

    # ---- Step 7: build artifacts for all locations (terminal step) -----------
    # make_artifacts reads the generated caps / hemoglobin / PAF outputs and
    # builds the .hdf per location.
    # NOTE: -o must be the same INSERT_VALID_DIRECTORY the PAF sim (Step 6) built the artifact in.
    - name: "make_artifacts"
      environment: vivarium_gates_mncnh_artifact
      command: 'bash -lc "yes y | make_artifacts -l all -o INSERT_VALID_DIRECTORY/"'
      resources:
        memory_gb: 1
        runtime: "01:00:00"
