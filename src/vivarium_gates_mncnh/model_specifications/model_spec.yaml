plugins:
    required:
        clock:
            controller: vivarium_gates_mncnh.plugins.time.EventClock
            builder_interface: vivarium_gates_mncnh.plugins.time.TimeInterface

components:
    vivarium_gates_mncnh:
        components:
            - Hemoglobin()  # batch 2
            - AnemiaInterventionPropensity()  # batch 4
            - AgelessPopulation("population.scaling_factor") # batch 1
            - Pregnancy() # batch 1
            - ResultsStratifier() # batch 1
            - ANCAttendance() # batch 1
            - Ultrasound() # batch 1
            - MaternalDisorder("maternal_obstructed_labor_and_uterine_rupture") # batch 1
            - MaternalDisorder("maternal_hemorrhage") # batch 1
            - MaternalDisorder("maternal_sepsis_and_other_maternal_infections") # batch 1
            - ResidualMaternalDisorders() # batch 1
            - AbortionMiscarriageEctopicPregnancy() # batch 1
            - MaternalDisordersBurden() # batch 1
            - LBWSGRisk() # batch 1
            - LBWSGRiskEffect('cause.all_causes.all_cause_mortality_risk')  # batch 3
            - LBWSGRiskEffect('cause.neonatal_sepsis_and_other_neonatal_infections.cause_specific_mortality_risk')  # batch 3
            - LBWSGRiskEffect('cause.neonatal_preterm_birth_with_rds.cause_specific_mortality_risk')  # batch 3
            - LBWSGRiskEffect('cause.neonatal_preterm_birth_without_rds.cause_specific_mortality_risk')  # batch 3
            - LBWSGRiskEffect('cause.neonatal_encephalopathy_due_to_birth_asphyxia_and_trauma.cause_specific_mortality_risk')  # batch 3
            - PretermBirth('neonatal_preterm_birth_with_rds') # batch 1
            - PretermBirth('neonatal_preterm_birth_without_rds') # batch 1
            - NeonatalCause('neonatal_sepsis_and_other_neonatal_infections') # batch 1
            - NeonatalCause('neonatal_encephalopathy_due_to_birth_asphyxia_and_trauma') # batch 1
            - NeonatalMortality() # batch 1
            - CPAPAndACSRiskEffect()  # batch 4
            - InterventionRiskEffect('antibiotics')  # batch 4
            - InterventionRiskEffect('probiotics')  # batch 4
            - InterventionRiskEffect('azithromycin')  # batch 4
            - InterventionRiskEffect('misoprostol')  # batch 4
            - OralIronInterventionExposure() # IFA and MMS  # batch 3
            - OralIronEffectOnHemoglobin()  # batch 4
            - OralIronEffectOnStillbirth()  # batch 4
            - AdditiveRiskEffect('risk_factor.iron_folic_acid_supplementation', 'risk_factor.birth_weight.birth_exposure')  # batch 3
            - AdditiveRiskEffect('risk_factor.multiple_micronutrient_supplementation', 'risk_factor.birth_weight.birth_exposure')  # batch 3
            - OralIronEffectsOnGestationalAge()  # batch 3
            - IVIronExposure()  # batch 4
            - IVIronEffectOnHemoglobin()  # batch 4
            - IVIronEffectOnLBWSG()  # batch 4
            - IVIronEffectOnStillbirth()  # batch 4
            - DeliveryFacility() # batch 1
            - InterventionAccess('cpap')  # batch 4
            - InterventionAccess('antibiotics')  # batch 4
            - InterventionAccess('probiotics')  # batch 4
            - InterventionAccess('azithromycin')  # batch 4
            - InterventionAccess('misoprostol')  # batch 4
            - ACSAccess()  # batch 4
            - PostpartumDepression() # batch 1
            - HemoglobinRiskEffect('risk_factor.hemoglobin', 'cause.maternal_hemorrhage.incidence_risk')  # batch 3
            - HemoglobinRiskEffect('risk_factor.hemoglobin', 'cause.maternal_sepsis_and_other_maternal_infections.incidence_risk')  # batch 3
            - CorrelatedPropensities() # batch 1
            - AnemiaScreening()  # batch 2
            # Observers 
            - ANCHemoglobinObserver() # batch 1
            - ANCOtherObserver() # batch 1
            - BirthObserver() # batch 1
            - MaternalDisordersBurdenObserver() # batch 1
            - NeonatalBurdenObserver() # batch 1
            - AnemiaYLDsObserver() # batch 2
            - NeonatalCauseRelativeRiskObserver()  # batch 3
            - InterventionObserver('cpap')  # batch 4
            - InterventionObserver('antibiotics')  # batch 4
            - InterventionObserver('probiotics')  # batch 4
            - InterventionObserver('azithromycin')  # batch 4
            - InterventionObserver('misoprostol')  # batch 4
            - PostpartumDepressionObserver() # batch 1
            - NeonatalACMRiskObserver() # batch 1
            - NeonatalCSMRiskObserver() # batch 1
            - ImpossibleNeonatalCSMRiskObserver() # batch 1

configuration:
    input_data:
        input_draw_number: 60
        # artifact_path: "/mnt/team/simulation_science/pub/models/vivarium_gates_mncnh/artifacts/model30.0/ethiopia.hdf"
    interpolation:
        order: 0
        extrapolate: True
    randomness:
        map_size: 1_000_000
        key_columns: ['entrance_time', 'age']
        random_seed: 0
        rate_conversion_type: 'exponential'
    time:
        start:
            year: 2025
            month: 1
            day: 1 
        simulation_events: 
            - 'first_trimester_anc'
            - 'later_pregnancy_screening'
            - 'later_pregnancy_intervention'
            - 'later_pregnancy_visit_timing'
            - 'ultrasound'
            - 'delivery_facility'
            - 'azithromycin_access'
            - 'misoprostol_access'
            - 'cpap_access'
            - 'acs_access'
            - 'antibiotics_access'
            - 'probiotics_access'
            - 'maternal_obstructed_labor_and_uterine_rupture'
            - 'maternal_hemorrhage'
            - 'maternal_sepsis_and_other_maternal_infections'
            - 'residual_maternal_disorders'
            - 'abortion_miscarriage_ectopic_pregnancy'
            - 'mortality'
            - 'early_neonatal_mortality'
            - 'late_neonatal_mortality'
            - 'postpartum_depression'

    population:
        # SBACHMEI - set back to 20_000
        # population_size: 20_000
        population_size: 200_000
        initialization_age_min: 10
        initialization_age_max: 54
        include_sex: "Female"
    
    stratification:
        anc_hemoglobin:
            include:
                - 'age_group'
                - 'pregnancy_outcome'
                - 'anc_coverage'
                - 'preterm_birth'
                - 'oral_iron_coverage'
                - 'iv_iron_coverage'
                - 'true_hemoglobin_exposure'
                - 'tested_hemoglobin_exposure'
                - 'ferritin_status'
        anc_other:
            include:
                - 'age_group'
                - 'pregnancy_outcome'
                - 'anc_coverage'
                - 'ultrasound_type'
                - 'delivery_facility_type'
                - 'preterm_birth'
                - 'believed_preterm'
                - 'acs_eligibility'
                - 'acs_availability'
                - 'azithromycin_availability'
                - 'misoprostol_availability'
        birth:
            include:
                - 'child_sex'
                - 'delivery_facility_type'
                - 'pregnancy_outcome'
                - 'antibiotics_availability'
                - 'probiotics_availability'
                - 'cpap_availability'
                - 'acs_availability'
                - 'acs_eligibility'
                - 'preterm_birth'
        maternal_disorders_burden:
            include:
                - 'age_group'
                - 'delivery_facility_type'
                - 'pregnancy_outcome'
                - 'azithromycin_availability'
                - 'misoprostol_availability'
        neonatal_burden:
            include:
                - 'child_sex'
                - 'child_age_group'
                - 'delivery_facility_type'
                - 'cpap_availability'
                - 'antibiotics_availability'
                - 'probiotics_availability'
                - 'acs_availability'
                - 'acs_eligibility'
                - 'preterm_birth'
        neonatal_cause_relative_risk:
            include:
                - 'child_age_group'
                - 'child_sex'
        intervention_cpap:
            include:
                - 'delivery_facility_type'
        intervention_antibiotics:
            include:
                - 'delivery_facility_type'
        intervention_probiotics: 
            include:
                - 'delivery_facility_type'
                - 'preterm_birth'
        intervention_azithromycin:
            include:
                - 'age_group'
                - 'delivery_facility_type'
        intervention_misoprostol:
            include:
                - 'age_group'
                - 'delivery_facility_type'
        postpartum_depression:
            include:
                - 'age_group'
                - 'delivery_facility_type'
                - 'pregnancy_outcome'
                - 'azithromycin_availability'
                - 'misoprostol_availability'
        neonatal_acm_risk:
            include:
                - 'child_sex'
                - 'child_age_group'
                - 'delivery_facility_type'
                - 'cpap_availability'
                - 'antibiotics_availability'
                - 'probiotics_availability'
                - 'acs_availability'
                - 'acs_eligibility'
                - 'preterm_birth'
        neonatal_csm_risk:
            include:
                - 'child_sex'
                - 'child_age_group'
                - 'delivery_facility_type'
                - 'cpap_availability'
                - 'antibiotics_availability'
                - 'probiotics_availability'
                - 'acs_availability'
                - 'acs_eligibility'
                - 'preterm_birth'
        impossible_neonatal_csm_risk:
            include:
                - 'child_sex'
                - 'child_age_group'
                - 'delivery_facility_type'
                - 'cpap_availability'
                - 'antibiotics_availability'
                - 'probiotics_availability'
                - 'acs_availability'
                - 'acs_eligibility'
                - 'preterm_birth'
    correlated_propensity_components:
        - 'antenatal_care'
        - 'delivery_facility'
        - 'risk_factor.low_birth_weight_and_short_gestation'
    propensity_ordering:
        antenatal_care:
            - 'none'
            - 'later_pregnancy_only'
            - 'first_trimester_only'
            - 'first_trimester_and_later_pregnancy'

    intervention:
        scenario:
            # 'baseline'
            # "cpap_acs_scaleup"
            # "cpap_acs_ai_ultrasound_scaleup"
            # "neonatal_antibiotics_scaleup"
            # "neonatal_probiotics_scaleup"
            # "azithromycin_scaleup"
            # "ai_ultrasound_scaleup"
            # "standard_ultrasound_scaleup"
            # "full_product_scaleup"
            # "mms_total_scaleup"
            # "anemia_screening_and_iv_iron_scaleup"
            # "azithromycin_vv"
            # "misoprostol_vv"
            "ultrasound_vv"
            # "anemia_screening_vv"