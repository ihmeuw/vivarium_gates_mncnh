workflow:
  name: "test_pipeline"
  project: "proj_simscience"
  queue: "all.q"
  output_directory: "/ihme/homes/albrja/scratch/test_pipeline_v4"
  steps:
    - name: "step1_echo_fail"
      command: "echo 'step 1 failing intentionally' && exit 1"
      resources:
        memory_gb: 1
        runtime: "00:01:00"
    - name: run_simulation
      type: simulation
      resources:
        memory_gb: 16
        runtime: "01:00:00"
      args:
        config: run_config.yaml
    - name: "step3_echo"
      command: "echo 'step 3 complete'"
      resources:
        memory_gb: 1
        runtime: "00:01:00"
